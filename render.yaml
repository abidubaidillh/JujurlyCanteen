services:
  - type: web
    name: jujurly-ai-detector
    runtime: python

    rootDir: ai-detector

    buildCommand: pip install -r requirements.txt

    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /

    envVars:
      - key: SUPABASE_URL
        sync: false

      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      - key: ALLOWED_ORIGINS
        sync: false